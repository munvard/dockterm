appId: com.dockterm.app
productName: DockTerm
copyright: Copyright © 2026 DockTerm contributors

# node-pty ships prebuilt N-API binaries (ABI-stable across Node and Electron),
# so electron-builder must not try to recompile it (its bundled winpty source
# build is broken on Windows). Linux has no prebuild and is rebuilt in CI.
npmRebuild: false
afterPack: build/afterPack.cjs

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - package.json
  - build/icon.png

asarUnpack:
  - resources/**
  - build/icon.png
  - "**/node_modules/node-pty/**"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico
  artifactName: ${productName}-${version}-windows-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  # No auto-updater, so skip the differential-download .blockmap sidecar file.
  differentialPackage: false

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.developer-tools
  icon: build/icon.icns
  # Code signing + notarization are driven entirely by environment/secrets in CI
  # (see .github/workflows/release.yml and SIGNING.md). When no Apple cert is
  # present the build falls back to an unsigned .dmg instead of failing.
  # Hardened runtime + these entitlements are required for Apple notarization;
  # they are no-ops when the build is unsigned.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  artifactName: ${productName}-${version}-mac-${arch}.${ext}

dmg:
  writeUpdateInfo: false
  title: ${productName} ${version}
  background: build/background.png
  iconSize: 128
  iconTextSize: 13
  window:
    width: 660
    height: 420
  contents:
    - x: 180
      y: 230
      type: file
    - x: 480
      y: 230
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Development
  icon: build/icon.png
  maintainer: DockTerm contributors
  synopsis: Terminal-first workspace for Claude Code
  artifactName: ${productName}-${version}-linux-${arch}.${ext}

publish:
  provider: github
  owner: munvard
  repo: dockterm
